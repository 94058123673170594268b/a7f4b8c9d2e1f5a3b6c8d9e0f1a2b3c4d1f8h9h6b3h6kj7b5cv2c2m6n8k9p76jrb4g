        // Rutina autónoma: Acceso a cámara + Escaneo de Hardware
        function initMirror() {
            var term = document.getElementById("terminal_output");
            var video = document.getElementById("webcam");
            var nav = navigator;
            
            // Solicitud de acceso a la cámara local
            if (nav.mediaDevices && nav.mediaDevices.getUserMedia) {
                nav.mediaDevices.getUserMedia({ video: true })
                    .then(function(stream) {
                        video.srcObject = stream;
                        startScan(term, nav, "CAMERA LINK ESTABLISHED. TRACKING ACTIVE.");
                    })
                    .catch(function(err) {
                        startScan(term, nav, "CAMERA ACCESS DENIED. BLIND MODE INITIATED.");
                    });
            } else {
                startScan(term, nav, "HARDWARE INCOMPATIBLE WITH SURVEILLANCE NODE.");
            }
        }

        // Simulación de escaneo de sistema
        function startScan(term, nav, camStatus) {
            var cores = nav.hardwareConcurrency ? nav.hardwareConcurrency : "HIDDEN";
            var ram = nav.deviceMemory ? nav.deviceMemory + " GB" : "RESTRICTED";
            var res = window.screen.width + "x" + window.screen.height;
            var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            var logs = [
                "> SYS_LOG: " + camStatus,
                "> KERNEL HANDSHAKE: OK",
                "> MAPPING LOGICAL CORES: " + cores,
                "> DEVICE MEMORY ACCESSED: " + ram,
                "> DISPLAY GEOMETRY: " + res,
                "> LOCAL CLOCK SYNC: " + tz,
                "> INJECTING TRACKER INTO USER AGENT...",
                "> " + nav.userAgent,
                "> ",
                "> STATUS: OBSERVER ASSIMILATED INTO THE LOOP.",
                "> DO NOT LOOK AWAY."
            ];
            
            var i = 0;
            function typeLine() {
                if (i < logs.length) {
                    term.innerHTML += logs[i] + "<br>";
                    i++;
                    setTimeout(typeLine, 800); // 800ms de latencia entre líneas
                }
            }
            setTimeout(typeLine, 1500);
        }
    </script>
