שָׂטָן (ha-satan)

在旧约圣经中，撒旦不是一个叛逆的存在。
它是一个头衔。一个天庭的官员。一个检察官。

约伯记 1:6 - 他与众天使一同站在上帝面前。
他没有自己的国度。他不领导邪恶的力量。
他只是控告。他只是考验。

这种转变发生在两约之间的时期。
受琐罗亚斯德教的影响。受启示文学的影响。

在新约圣经中，他已经是"这世界的王"。
但耶稣从未直呼其名。
他说"那试探人的"，"那仇敌"，"那恶者"。

现代的撒旦是中世纪的发明。
但丁。弥尔顿。晚期教会。

原始经文没有邪恶的国度。
没有作为监狱的地狱。
没有堕落的叛逆天使。

这一切都是后来添加的。
